<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>工数ログ</title>
<style>
  :root{
    /* --- 業務日報 / 台帳の質感 --- */
    --paper:#F7F8FA;        /* 用紙 */
    --paper-2:#FFFFFF;      /* カード面 */
    --ink:#1E2A38;          /* 墨 */
    --ink-soft:#4B5563;     /* 副次テキスト */
    --rule:#E4E8EE;         /* 罫線 */
    --rule-strong:#D3D9E2;
    --figure:#6B7684;       /* 時刻の数字 */
    --shu:#DC4A2E;          /* 朱 = 今 / 進行中 */
    --shu-soft:rgba(220,74,46,.10);
    --shadow:0 1px 2px rgba(30,42,56,.06),0 8px 24px rgba(30,42,56,.08);

    --font-disp:"Yu Mincho","YuMincho","Hiragino Mincho ProN",serif;
    --font-ui:"Hiragino Kaku Gothic ProN","Yu Gothic","YuGothic","Meiryo",system-ui,sans-serif;
    --font-mono:"SFMono-Regular",Menlo,Consolas,"Liberation Mono",monospace;

    --px-min:1.25;          /* 1分あたりの高さ(px) */
    --safe-b:env(safe-area-inset-bottom,0px);
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;height:100%}
  body{
    font-family:var(--font-ui);
    background:var(--paper);
    color:var(--ink);
    font-size:14px;line-height:1.5;
    -webkit-font-smoothing:antialiased;
    display:flex;flex-direction:column;height:100dvh;overflow:hidden;
  }
  button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
  input,select{font-family:inherit;font-size:14px}
  .mono{font-family:var(--font-mono);font-variant-numeric:tabular-nums}

  /* ---------- ヘッダ ---------- */
  header{
    flex:0 0 auto;display:flex;align-items:center;gap:10px;
    padding:12px 16px calc(12px);border-bottom:1px solid var(--rule);
    background:var(--paper-2);
  }
  .today-btn{
    border:1px solid var(--rule-strong);border-radius:8px;padding:7px 12px;
    font-size:13px;font-weight:600;color:var(--ink-soft);background:var(--paper-2);
  }
  .today-btn:hover{border-color:var(--figure)}
  .nav{display:flex;align-items:center;gap:2px}
  .nav button{width:34px;height:34px;border-radius:8px;font-size:18px;color:var(--ink-soft)}
  .nav button:hover{background:var(--paper)}
  .date-h{font-family:var(--font-disp);font-size:22px;font-weight:600;letter-spacing:.02em;white-space:nowrap}
  .date-dow{font-size:14px;color:var(--ink-soft);margin-left:2px}
  .spacer{flex:1}
  .icon-btn{
    width:38px;height:38px;border-radius:9px;border:1px solid var(--rule);
    display:grid;place-items:center;color:var(--ink-soft);background:var(--paper-2);
  }
  .icon-btn:hover{border-color:var(--figure);color:var(--ink)}
  .icon-btn svg{width:18px;height:18px}

  /* ---------- 作業領域(タイムライン + メモ) ---------- */
  .work{flex:1 1 auto;display:flex;min-height:0}
  .scroll{flex:1 1 auto;overflow-y:auto;overflow-x:hidden;position:relative}
  .side{border-left:1px solid var(--rule);background:var(--paper-2);overflow-y:auto;display:none;min-width:0}
  @media(min-width:880px){
    .scroll{flex:0 0 520px}
    .side{display:block;flex:1 1 auto}
  }
  .timeline{position:relative;margin:0;padding:8px 0}

  /* ---------- 右：メモ / 日報パネル ---------- */
  .side-head{display:flex;align-items:baseline;gap:10px;padding:14px 16px 8px}
  .side-head h3{margin:0;font-size:14px;font-weight:700}
  .side-total{margin-left:auto;font-family:var(--font-mono);font-weight:700;font-size:15px;color:var(--ink-soft)}
  .day-memo{
    display:block;width:calc(100% - 32px);margin:0 16px 6px;padding:10px 12px;
    border:1px solid var(--rule-strong);border-radius:10px;background:var(--paper);
    outline:none;resize:vertical;min-height:52px;line-height:1.6;font-size:13.5px;color:var(--ink);
  }
  .day-memo:focus{border-color:var(--figure)}
  .side-label{font-size:11px;color:var(--figure);font-weight:600;margin:12px 22px 6px}
  #logRows{padding:0 16px 20px}
  .log-row{border-bottom:1px solid var(--rule);padding:9px 0}
  .log-row.running{background:var(--shu-soft);margin:0 -8px;padding:9px 8px;border-radius:8px;border-bottom:none}
  .log-top{display:flex;align-items:center;gap:8px;cursor:pointer}
  .log-top:hover .log-cli{text-decoration:underline}
  .log-dot{width:10px;height:10px;border-radius:3px;flex:0 0 auto}
  .log-time{font-size:12px;color:var(--figure);flex:0 0 auto}
  .log-cli{font-size:13px;font-weight:700;flex:1;min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .log-dur{font-size:12px;color:var(--ink-soft);flex:0 0 auto}
  .log-task{font-size:12px;color:var(--ink-soft);cursor:pointer;margin:2px 0 4px 18px}
  .log-memo{
    display:block;width:calc(100% - 18px);margin-left:18px;padding:6px 9px;
    border:1px solid transparent;border-radius:8px;background:var(--paper);
    outline:none;resize:none;overflow:hidden;line-height:1.55;font-size:12.5px;color:var(--ink);min-height:32px;
  }
  .log-memo::placeholder{color:var(--figure)}
  .log-memo:focus{border-color:var(--figure);background:var(--paper-2)}
  .grid{position:relative;margin-left:56px;margin-right:14px}
  .hour-row{position:absolute;left:0;right:0;border-top:1px solid var(--rule)}
  .hour-label{
    position:absolute;left:-56px;width:48px;text-align:right;
    transform:translateY(-8px);font-size:12px;color:var(--figure);
  }
  .half-row{position:absolute;left:0;right:0;border-top:1px dashed var(--rule)}

  .block{
    position:absolute;border-radius:8px;overflow:hidden;cursor:pointer;
    padding:5px 9px;color:#fff;box-shadow:var(--shadow);
    transition:filter .12s;min-height:22px;
    border:1px solid rgba(255,255,255,.18);
  }
  .block:hover{filter:brightness(1.05)}
  .block .b-client{font-size:12px;font-weight:700;line-height:1.25;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .block .b-task{font-size:11px;opacity:.92;line-height:1.2;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .block .b-dur{font-size:10px;opacity:.8;font-family:var(--font-mono)}
  .block.running{border:1px solid rgba(255,255,255,.5)}
  .block.running::after{
    content:"";position:absolute;left:0;right:0;bottom:0;height:3px;background:#fff;
    animation:pulse 1.6s ease-in-out infinite;
  }
  @keyframes pulse{0%,100%{opacity:.35}50%{opacity:1}}

  /* 今 */
  .now-line{position:absolute;left:-56px;right:0;height:0;border-top:2px solid var(--shu);z-index:5;pointer-events:none}
  .now-flag{
    position:absolute;left:-56px;transform:translateY(-9px);
    background:var(--shu);color:#fff;font-size:10px;font-weight:700;
    padding:1px 6px;border-radius:4px 4px 4px 0;font-family:var(--font-mono);
    pointer-events:none;
  }
  .now-dot{position:absolute;left:-4px;transform:translateY(-4px);width:8px;height:8px;border-radius:50%;background:var(--shu);z-index:6;pointer-events:none}
  .ghost{
    position:absolute;left:0;right:0;background:var(--shu-soft);
    border:1.5px dashed var(--shu);border-radius:8px;z-index:4;pointer-events:none;
  }

  .empty-hint{
    position:absolute;left:0;right:0;top:40%;text-align:center;color:var(--figure);
    font-size:13px;pointer-events:none;padding:0 20px;
  }

  /* ---------- ふりかえり（月ダッシュボード・画面切替） ---------- */
  body.mode-analysis .work{display:none}
  body.mode-analysis .today-btn,body.mode-analysis .nav,body.mode-analysis .date-jump{display:none}
  .ana-head-title{font-family:var(--font-disp);font-size:22px;font-weight:600;letter-spacing:.02em}
  .icon-btn.active{background:var(--ink);border-color:var(--ink);color:#fff}
  .icon-btn.active:hover{color:#fff}
  .analysis{display:none}
  body.mode-analysis .analysis{display:block;flex:1 1 auto;min-height:0;overflow-y:auto;padding:14px 16px calc(18px + var(--safe-b))}
  .ana-inner{max-width:1440px;margin:0 auto}
  .ana-nav{display:flex;align-items:center;gap:6px}
  .ana-nav button{width:34px;height:34px;border-radius:9px;border:1px solid var(--rule);background:var(--paper-2);color:var(--ink-soft);font-size:18px;display:grid;place-items:center}
  .ana-nav button:hover{border-color:var(--figure);color:var(--ink)}
  .ana-title{font-family:var(--font-disp);font-size:20px;font-weight:600;letter-spacing:.02em;min-width:128px;text-align:center}
  .ana-this{width:auto!important;padding:0 13px;font-size:12px;font-weight:600;margin-left:auto}
  .ana-hero{display:flex;align-items:baseline;gap:12px;flex-wrap:wrap;margin:12px 4px 4px}
  .ana-total{font-family:var(--font-disp);font-size:36px;font-weight:600;letter-spacing:.01em;line-height:1}
  .ana-meta{font-size:12px;color:var(--ink-soft)}
  .ana-card{background:var(--paper-2);border:1px solid var(--rule);border-radius:14px;padding:13px 15px 12px;margin:13px 0 0;box-shadow:var(--shadow)}
  .ana-card h4{margin:0 0 10px;font-size:12px;font-weight:700;color:var(--ink-soft);letter-spacing:.05em}
  .ana-card h4 .sub{font-weight:400;color:var(--figure)}
  .ana-main{display:grid;grid-template-columns:minmax(0,1.9fr) minmax(0,1fr);gap:15px;align-items:start}
  .ana-two{display:grid;grid-template-columns:1fr 1fr;gap:13px;align-items:start}
  .ana-day-card{position:sticky;top:0}
  @media(max-width:900px){
    .ana-main,.ana-two{grid-template-columns:1fr}
    .ana-day-card{position:static}
  }

  /* 日詳細（カレンダー右のメモ欄） */
  .ad-head{display:flex;align-items:baseline;gap:10px;flex-wrap:wrap;margin:0 0 4px}
  .ad-date{font-family:var(--font-disp);font-size:17px;font-weight:700}
  .ad-total{font-family:var(--font-mono);font-size:14px;font-weight:700;color:var(--ink-soft)}
  .ad-saved{font-size:10.5px;font-weight:700;color:#41684F;background:rgba(91,138,114,.14);border:1px solid rgba(91,138,114,.35);border-radius:99px;padding:2px 9px}
  .ad-open{margin-left:auto;font-size:12px;font-weight:600;color:var(--ink-soft);border:1px solid var(--rule-strong);border-radius:8px;padding:5px 11px;background:var(--paper)}
  .ad-open:hover{border-color:var(--figure);color:var(--ink)}
  .sum-head{display:flex;align-items:baseline;gap:10px;margin-bottom:8px}
  .sum-head h3{margin:0;font-size:13px;font-weight:700}
  .sum-total{margin-left:auto;font-family:var(--font-mono);font-weight:700;font-size:15px}
  .sum-row{display:flex;align-items:center;gap:8px;margin:5px 0}
  .sum-dot{width:10px;height:10px;border-radius:3px;flex:0 0 auto}
  .sum-name{flex:0 0 42%;font-size:12.5px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .sum-bar-wrap{flex:1;height:8px;background:var(--paper);border-radius:4px;overflow:hidden;display:flex}
  .sum-bar{height:100%;border-radius:4px;flex:0 0 auto}
  .sum-bar.travel{opacity:.32;border-radius:0 4px 4px 0;margin-left:-2px}
  .ana-travel{font-family:var(--font-mono);font-size:13px;font-weight:700;color:var(--ink-soft)}
  .sum-time{flex:0 0 auto;font-family:var(--font-mono);font-size:12px;color:var(--ink-soft);width:52px;text-align:right}
  .sum-sub{margin:8px 0 4px;font-size:11px;color:var(--figure);font-weight:600}
  .sum-toggle{display:inline-flex;border:1px solid var(--rule-strong);border-radius:8px;overflow:hidden;margin-bottom:8px}
  .sum-toggle button{padding:5px 16px;font-size:12px;font-weight:700;color:var(--figure);background:var(--paper)}
  .sum-toggle button.on{background:var(--ink);color:#fff}
  .sum-meta{font-size:11.5px;color:var(--ink-soft);margin:-2px 0 6px}
  .sum-copy{margin-left:8px;font-size:11px;color:var(--figure);text-decoration:underline;padding:2px 4px}
  .sum-copy:hover{color:var(--ink)}

  /* ---------- 下部アクション ---------- */
  .dock{
    flex:0 0 auto;padding:10px 16px calc(10px + var(--safe-b));
    border-top:1px solid var(--rule);background:var(--paper-2);
    display:flex;gap:10px;
  }
  .btn-primary{
    flex:1;border-radius:12px;padding:14px;font-size:15px;font-weight:700;
    background:var(--ink);color:#fff;display:flex;align-items:center;justify-content:center;gap:8px;
  }
  .btn-primary:hover{background:#111a24}
  .btn-running{
    flex:1;border-radius:12px;padding:11px 14px;text-align:left;
    background:var(--paper);border:1.5px solid var(--shu);display:flex;align-items:center;gap:10px;
  }
  .run-dot{width:11px;height:11px;border-radius:50%;background:var(--shu);flex:0 0 auto;animation:pulse 1.6s ease-in-out infinite}
  .run-meta{flex:1;min-width:0}
  .run-cli{font-size:13px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .run-task{font-size:11px;color:var(--ink-soft);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .run-elapsed{font-family:var(--font-mono);font-weight:700;font-size:16px;color:var(--shu)}
  .btn-stop{border-radius:10px;padding:0 16px;background:var(--shu);color:#fff;font-weight:700;font-size:14px}
  .btn-switch{border-radius:10px;padding:0 14px;border:1px solid var(--rule-strong);color:var(--ink-soft);font-weight:600}

  /* ---------- シート / モーダル ---------- */
  .scrim{position:fixed;inset:0;background:rgba(30,42,56,.38);z-index:40;display:none;opacity:0;transition:opacity .18s}
  .scrim.open{display:block;opacity:1}
  .sheet{
    position:fixed;left:0;right:0;bottom:0;z-index:41;background:var(--paper-2);
    border-radius:18px 18px 0 0;box-shadow:0 -8px 40px rgba(30,42,56,.2);
    max-height:82dvh;display:flex;flex-direction:column;
    transform:translateY(100%);transition:transform .22s cubic-bezier(.2,.8,.2,1);
    padding-bottom:var(--safe-b);
  }
  .sheet.open{transform:translateY(0)}
  .sheet-grip{width:38px;height:4px;border-radius:2px;background:var(--rule-strong);margin:10px auto 4px}
  .sheet-head{display:flex;align-items:center;padding:6px 18px 10px;gap:10px}
  .sheet-head h2{margin:0;font-size:16px;font-weight:700}
  .sheet-head .back{font-size:20px;color:var(--ink-soft);width:30px;height:30px;border-radius:8px}
  .sheet-head .back:hover{background:var(--paper)}
  .sheet-body{overflow-y:auto;padding:0 14px 16px}

  .search{
    width:100%;padding:11px 14px;border:1px solid var(--rule-strong);border-radius:10px;
    background:var(--paper);margin:0 0 10px;outline:none;
  }
  .search:focus{border-color:var(--figure)}
  .list-label{font-size:11px;color:var(--figure);font-weight:600;margin:12px 6px 6px}
  .pick{
    width:100%;display:flex;align-items:center;gap:11px;padding:12px 12px;border-radius:10px;
    text-align:left;margin-bottom:4px;
  }
  .pick:hover{background:var(--paper)}
  .pick .dot{width:13px;height:13px;border-radius:4px;flex:0 0 auto}
  .pick .code{font-family:var(--font-mono);font-size:12px;color:var(--figure);flex:0 0 auto;min-width:34px}
  .pick .nm{font-size:14px;font-weight:600}
  .pick.special .nm{color:var(--ink-soft)}

  .chip-wrap{display:flex;flex-wrap:wrap;gap:8px}
  .chip{
    padding:11px 15px;border-radius:10px;border:1px solid var(--rule-strong);
    background:var(--paper);font-size:14px;font-weight:600;
  }
  .chip:hover{border-color:var(--figure)}

  .field{margin:12px 4px}
  .field label{display:block;font-size:11px;color:var(--figure);font-weight:600;margin-bottom:5px}
  .field input,.field select,.field textarea{
    width:100%;padding:11px 12px;border:1px solid var(--rule-strong);border-radius:10px;
    background:var(--paper);outline:none;
  }
  .field input:focus,.field select:focus,.field textarea:focus{border-color:var(--figure)}
  .row2{display:flex;gap:10px}.row2 .field{flex:1}
  .actions{display:flex;gap:10px;margin:16px 4px 4px}
  .btn-fill{flex:1;padding:13px;border-radius:11px;background:var(--ink);color:#fff;font-weight:700;font-size:14px}
  .btn-fill:hover{background:#111a24}
  .btn-ghost{padding:13px 16px;border-radius:11px;border:1px solid var(--rule-strong);color:var(--ink-soft);font-weight:600}
  .btn-danger{padding:13px 16px;border-radius:11px;border:1px solid rgba(220,74,46,.4);color:var(--shu);font-weight:600;background:var(--shu-soft)}

  .color-grid{display:flex;flex-wrap:wrap;gap:8px;margin-top:4px}
  .color-cell{width:30px;height:30px;border-radius:8px;border:2px solid transparent}
  .color-cell.sel{border-color:var(--ink);box-shadow:0 0 0 2px #fff inset}

  .settings-cli{display:flex;align-items:center;gap:10px;padding:9px 8px;border-bottom:1px solid var(--rule)}
  .settings-cli .dot{width:14px;height:14px;border-radius:4px;flex:0 0 auto}
  .settings-cli .code{font-family:var(--font-mono);font-size:12px;color:var(--figure);min-width:36px}
  .settings-cli .nm{flex:1;font-size:14px;font-weight:600}
  .settings-cli .edit{color:var(--figure);font-size:13px;padding:6px 8px;border-radius:7px}
  .settings-cli .edit:hover{background:var(--paper)}
  .seg{display:flex;gap:0;border:1px solid var(--rule-strong);border-radius:10px;overflow:hidden;margin:6px 4px 14px}
  .seg button{flex:1;padding:10px;font-size:13px;font-weight:600;color:var(--ink-soft)}
  .seg button.on{background:var(--ink);color:#fff}
  textarea.bulk{min-height:120px;resize:vertical;line-height:1.7;font-family:var(--font-mono);font-size:13px}
  .hint{font-size:12px;color:var(--figure);margin:6px 4px}
  .tasklist-item{display:flex;align-items:center;gap:8px;padding:8px;border-bottom:1px solid var(--rule)}
  .tasklist-item .nm{flex:1}
  .tasklist-item .x{color:var(--shu);padding:6px 9px;border-radius:7px;font-size:16px}
  .tasklist-item .x:hover{background:var(--shu-soft)}
  .add-inline{display:flex;gap:8px;margin-top:8px}
  .add-inline input{flex:1}
  .add-inline button{padding:0 16px;border-radius:9px;background:var(--ink);color:#fff;font-weight:700}

  .toast{
    position:fixed;left:50%;bottom:calc(90px + var(--safe-b));transform:translateX(-50%) translateY(12px);
    background:var(--ink);color:#fff;padding:10px 18px;border-radius:10px;font-size:13px;font-weight:600;
    z-index:60;opacity:0;transition:all .2s;pointer-events:none;box-shadow:var(--shadow);
  }
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

  /* ---------- カスタム時刻ピッカー（タップで即セット） ---------- */
  .tf-wrap{position:relative}
  .timefield{
    width:100%;padding:12px;border:1px solid var(--rule-strong);border-radius:10px;
    background:var(--paper);text-align:left;font-family:var(--font-mono);
    font-size:17px;font-weight:700;color:var(--ink);letter-spacing:.06em;
  }
  .timefield.empty{color:var(--figure);font-weight:600}
  .timefield.open{border-color:var(--shu);background:var(--paper-2);box-shadow:0 0 0 3px var(--shu-soft)}
  .timefield.disabled{opacity:.5}
  .tpick{
    position:absolute;top:calc(100% + 6px);left:0;z-index:40;
    width:248px;max-width:calc(100vw - 40px);
    border:1px solid var(--rule-strong);border-radius:12px;
    background:var(--paper-2);padding:9px;box-shadow:var(--shadow);
  }
  .tf-wrap.tf-right .tpick{left:auto;right:0}
  .tp-lab{display:flex;align-items:center;gap:4px;font-size:11px;color:var(--figure);font-weight:600;margin:1px 2px 8px}
  .tp-back{font-size:19px;color:var(--ink-soft);padding:0 6px 2px;line-height:1;margin-right:2px}
  .tp-back:hover{color:var(--ink)}
  .tp-grid{display:grid;grid-template-columns:repeat(6,1fr);gap:6px}
  .tp-cell{
    padding:11px 0;border-radius:8px;border:1px solid var(--rule);
    background:var(--paper);font-family:var(--font-mono);font-size:14px;font-weight:600;color:var(--ink);
  }
  .tp-cell:hover{border-color:var(--figure)}
  .tp-cell.sel{background:var(--ink);color:#fff;border-color:var(--ink)}
  .tp-cell:active{transform:scale(.94)}

  /* ---------- 日報の書き出し ---------- */
  .export-pre{
    width:100%;min-height:280px;max-height:48vh;resize:vertical;
    padding:12px 13px;border:1px solid var(--rule-strong);border-radius:11px;
    background:var(--paper);color:var(--ink);outline:none;
    font-family:var(--font-mono);font-size:12.5px;line-height:1.7;white-space:pre;overflow:auto;
  }
  .export-pre:focus{border-color:var(--figure)}
  .fs-row{display:flex;align-items:center;gap:8px;margin:10px 4px 2px;font-size:12px;color:var(--figure)}

  /* ---------- 自動保存バナー ---------- */

  /* ---------- 日付ジャンプ（ヘッダのタップ領域） ---------- */

  /* ---------- 月カレンダー（日付選択 / 記録ありドット） ---------- */
  .cal{padding:2px 2px 4px}

  .cal-nav button{width:38px;height:38px;border-radius:10px;border:1px solid var(--rule);color:var(--ink-soft);display:grid;place-items:center;font-size:20px;background:var(--paper-2)}

  .ov{margin-top:2px}

  .ov-cell>*{position:relative;z-index:1}

  @media(max-width:900px){.ov-cell{height:106px;padding:5px 6px}}

</style>

<script>
"use strict";
/* ============================================================
   工数ログ  （最終更新 2026-07）
   縦型タイムライン / 顧問先別の工数記録
   単一HTML・LocalStorage保存
   日報の書き出し（Markdown/テキスト）・Obsidian直接保存
============================================================ */

const STORE_KEY = "timeTracker.v1";
const VIEW_START_H = 6;    // タイムライン表示開始
const VIEW_END_H   = 22;   // 表示終了
const PX_MIN = 1.25;       // 1分あたり px

/* 顧問先の色パレット(落ち着いた識別色) */
const PALETTE = [
  "#3E6D9C","#5B8A72","#B07C3E","#7C5C93","#4E8C8A","#A8574F",
  "#556B8D","#6E8B3D","#9C6B4E","#4B5D8F","#A55A7A","#7A8A4E",
  "#3D7A8C","#8C6D3D","#6B5B95","#5E8A5E","#994D5C","#4C7A6B"
];
const COLOR_INTERNAL   = "#5A6472"; // 社内作業
const COLOR_UNASSIGNED = "#8A93A0"; // 顧問先なし

/* 業務内容の初期候補 */
const DEFAULT_TASKS = {
  client:   ["申告書作成","記帳・仕訳チェック","給与計算","決算・決算見込","消費税","相談・打合せ","資料作成","メール・電話","移動"],
  internal: ["試験勉強(相続税)","システム開発","事務所内業務","その他"]
};
/* 「移動」業務の判定（"移動" または "移動（往路）" 等の派生も拾う） */
function isTravelTask(t){ const s=(t||"").trim(); return s==="移動"||s.startsWith("移動"); }

/* ---------- 状態 ---------- */
let state = load();

function defaultState(){
  return {
    version:1,
    clients:[
      {id:"internal", kind:"internal",   code:"",    name:"社内作業",   color:COLOR_INTERNAL},
      {id:"none",     kind:"unassigned", code:"",    name:"顧問先なし", color:COLOR_UNASSIGNED},
      {id:uid(),      kind:"client",     code:"407", name:"Cyres",     color:PALETTE[0]}
    ],
    tasks:{client:[...DEFAULT_TASKS.client], internal:[...DEFAULT_TASKS.internal]},
    entries:[], // {id, clientId, task, start:ms, end:ms|null, memo:""}
    dayMemos:{}, // {"YYYY-MM-DD": text}
    savedDays:{}, // {"YYYY-MM-DD": true} … Obsidianへ保存済みの印
    resaveDays:{} // {"YYYY-MM-DD": true} … 保存後に修正され、再保存待ちの日（期限なし）
  };
}
function load(){
  try{
    const raw=localStorage.getItem(STORE_KEY);
    if(!raw) return defaultState();
    const s=JSON.parse(raw);
    if(!s||!s.clients||!s.entries) return defaultState();
    if(!s.tasks) s.tasks={client:[...DEFAULT_TASKS.client],internal:[...DEFAULT_TASKS.internal]};
    if(s.tasks.client && !s.tasks.client.some(t=>(t||"").trim()==="移動")) s.tasks.client.push("移動");
    if(!s.dayMemos) s.dayMemos={};
    if(!s.savedDays) s.savedDays={};
    if(!s.resaveDays) s.resaveDays={};
    return s;
  }catch(e){ return defaultState(); }
}
function save(){ try{ localStorage.setItem(STORE_KEY,JSON.stringify(state)); }catch(e){} }
function uid(){ return Date.now().toString(36)+Math.random().toString(36).slice(2,7); }
/* 記録を触った日は「保存済み」印を外し、翌起動で自動保存し直す */
function markKeyDirty(k){
  // 一度Obsidianへ保存された日が後から修正された → 期限なしで再保存対象に積む
  if(state.savedDays&&state.savedDays[k]){
    delete state.savedDays[k];
    if(!state.resaveDays) state.resaveDays={};
    state.resaveDays[k]=true;
  }
}
function markDayDirty(ms){ markKeyDirty(dateKey(new Date(ms))); }

/* ---------- 日付ユーティリティ ---------- */
let selDate = startOfDay(new Date());
function startOfDay(d){ const x=new Date(d); x.setHours(0,0,0,0); return x; }
function isSameDay(a,b){ return startOfDay(a).getTime()===startOfDay(b).getTime(); }
function dateKey(d){ d=startOfDay(d); return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0"); }
function fmtTime(ms){ const d=new Date(ms); return String(d.getHours()).padStart(2,"0")+":"+String(d.getMinutes()).padStart(2,"0"); }
function fmtDur(min){
  min=Math.max(0,Math.round(min));
  const h=Math.floor(min/60), m=min%60;
  if(h===0) return m+"分";
  return h+"時間"+(m?m+"分":"");
}
function fmtDurShort(min){
  min=Math.max(0,Math.round(min)); const h=Math.floor(min/60),m=min%60;
  return h ? h+":"+String(m).padStart(2,"0") : m+"m";
}

/* ---------- 顧問先ヘルパ ---------- */
function getClient(id){ return state.clients.find(c=>c.id===id)||state.clients[0]; }
function taskSetFor(client){ return client.kind==="internal" ? "internal":"client"; }
function runningEntry(){ return state.entries.find(e=>e.end===null); }

/* ============================================================
   描画：タイムライン
============================================================ */
const grid=document.getElementById("grid");
const scroll=document.getElementById("scroll");

function laneLayout(entries){
  // 開始順に並べ、重なりを列に振り分け
  const items=entries.map(e=>({e,s:e.start,en:e.end||Date.now()})).sort((a,b)=>a.s-b.s);
  let clusters=[],cur=[],curEnd=-1;
  for(const it of items){
    if(it.s>=curEnd && cur.length){ clusters.push(cur); cur=[]; curEnd=-1; }
    cur.push(it); curEnd=Math.max(curEnd,it.en);
  }
  if(cur.length) clusters.push(cur);
  const layout=new Map();
  for(const cl of clusters){
    const cols=[]; // each col: last end time
    for(const it of cl){
      let placed=-1;
      for(let i=0;i<cols.length;i++){ if(it.s>=cols[i]){ placed=i; cols[i]=it.en; break; } }
      if(placed<0){ placed=cols.length; cols.push(it.en); }
      layout.set(it.e.id,{col:placed});
    }
    const total=cols.length;
    for(const it of cl) layout.get(it.e.id).total=total;
  }
  return layout;
}

function renderTimeline(){
  grid.innerHTML="";
  const dayStart=startOfDay(selDate).getTime();
  const viewTop=dayStart+VIEW_START_H*3600000;
  const totalMin=(VIEW_END_H-VIEW_START_H)*60;
  grid.style.height=(totalMin*PX_MIN)+"px";

  // 時間罫線
  for(let h=VIEW_START_H;h<=VIEW_END_H;h++){
    const y=(h-VIEW_START_H)*60*PX_MIN;
    const row=document.createElement("div");
    row.className="hour-row"; row.style.top=y+"px";
    const lab=document.createElement("div");
    lab.className="hour-label mono"; lab.textContent=String(h).padStart(2,"0")+":00";
    row.appendChild(lab); grid.appendChild(row);
    if(h<VIEW_END_H){
      const half=document.createElement("div");
      half.className="half-row"; half.style.top=(y+30*PX_MIN)+"px"; grid.appendChild(half);
    }
  }

  // 当日エントリ
  const dayEntries=state.entries.filter(e=>isSameDay(new Date(e.start),selDate));
  if(dayEntries.length===0){
    const hint=document.createElement("div");
    hint.className="empty-hint";
    hint.textContent="この日の記録はまだありません。下の「開始」から計測するか、空いている時間帯をタップして後から追加できます。";
    grid.appendChild(hint);
  }
  const layout=laneLayout(dayEntries);

  for(const e of dayEntries){
    const cli=getClient(e.clientId);
    const end=e.end||Date.now();
    const sMin=(e.start-viewTop)/60000;
    const eMin=(end-viewTop)/60000;
    const top=Math.max(0,sMin*PX_MIN);
    const h=Math.max(22,(eMin-sMin)*PX_MIN);
    const lay=layout.get(e.id)||{col:0,total:1};
    const gap=3;
    const wPct=100/lay.total;
    const el=document.createElement("div");
    el.className="block"+(e.end===null?" running":"");
    el.style.top=top+"px"; el.style.height=h+"px";
    el.style.left=`calc(${lay.col*wPct}% + ${lay.col?gap/2:0}px)`;
    el.style.width=`calc(${wPct}% - ${gap}px)`;
    el.style.background=cli.color;
    const durMin=(end-e.start)/60000;
    const cliLabel=(cli.code?cli.code+" ":"")+cli.name;
    el.innerHTML=`<div class="b-client">${esc(cliLabel)}</div>`+
                 (h>34?`<div class="b-task">${esc(e.task||"")}</div>`:"")+
                 (h>50?`<div class="b-dur mono">${fmtTime(e.start)}–${e.end?fmtTime(end):"進行中"} · ${fmtDurShort(durMin)}</div>`:"");
    el.onclick=()=>openEditEntry(e.id);
    grid.appendChild(el);
  }

  // 今ライン
  const now=Date.now();
  if(isSameDay(new Date(now),selDate)){
    const nowMin=(now-viewTop)/60000;
    if(nowMin>=0 && nowMin<=totalMin){
      const y=nowMin*PX_MIN;
      const line=document.createElement("div"); line.className="now-line"; line.style.top=y+"px"; grid.appendChild(line);
      const flag=document.createElement("div"); flag.className="now-flag mono"; flag.style.top=y+"px"; flag.textContent=fmtTime(now); grid.appendChild(flag);
      const dot=document.createElement("div"); dot.className="now-dot"; dot.style.top=y+"px"; grid.appendChild(dot);
    }
  }
}

function esc(s){ return (s||"").replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c])); }

/* ---- 日付ジャンプ：月カレンダー（記録ありドット付き） ---- */
const CAL_SAVED_COLOR = "#5B8A72";   // 日報保存済み（落ち着いた緑）
let pickerMonth = null;
function dateKeyOf(y,mo,d){ return y+"-"+String(mo+1).padStart(2,"0")+"-"+String(d).padStart(2,"0"); }
function dayStatsIndex(){
  // "YYYY-MM-DD" -> {count, min}  … ①のドット判定用（③の俯瞰ビューでも流用予定）
  const idx=new Map(); const now=Date.now();
  for(const e of state.entries){
    const k=dateKey(new Date(e.start));
    let o=idx.get(k); if(!o){ o={count:0,min:0}; idx.set(k,o); }
    o.count++; o.min+=((e.end||now)-e.start)/60000;
  }
  return idx;
}
function openDatePicker(){
  pickerMonth=new Date(selDate.getFullYear(),selDate.getMonth(),1);
  drawDatePicker(); openSheet();
}
function drawDatePicker(){
  const idx=dayStatsIndex();
  const y=pickerMonth.getFullYear(), mo=pickerMonth.getMonth();
  const lead=new Date(y,mo,1).getDay();          // 先頭の空白数（0=日）
  const dim=new Date(y,mo+1,0).getDate();        // 月末日
  const todayKey=dateKey(new Date());
  const selKey=dateKey(selDate);
  let workDays=0; for(let d=1;d<=dim;d++){ if(idx.has(dateKeyOf(y,mo,d))) workDays++; }

  const dowCells=["日","月","火","水","木","金","土"]
    .map((w,i)=>`<span class="${i===0?"sun":i===6?"sat":""}">${w}</span>`).join("");
  let cells="";
  for(let i=0;i<lead;i++) cells+=`<div class="cal-cell blank"></div>`;
  for(let d=1;d<=dim;d++){
    const k=dateKeyOf(y,mo,d);
    const has=idx.has(k);
    const saved=!!(state.savedDays&&state.savedDays[k]);
    const dow=new Date(y,mo,d).getDay();
    const cls=["cal-cell"]; if(k===selKey)cls.push("sel"); if(k===todayKey)cls.push("today");
    const numCls=dow===0?"sun":dow===6?"sat":"";
    const dot=has
      ? `<span class="cal-dot" style="background:${saved?CAL_SAVED_COLOR:"var(--shu)"}"></span>`
      : `<span class="cal-dot-empty"></span>`;
    cells+=`<button class="${cls.join(" ")}" data-k="${k}"><span class="cal-num ${numCls}">${d}</span>${dot}</button>`;
  }
  sheetHead.innerHTML=`<h2>日付を選ぶ</h2>`;
  sheetBody.innerHTML=`
    <div class="cal">
      <div class="cal-nav">
        <button id="calPrev" aria-label="前の月">‹</button>
        <div class="cal-title">${y}年${mo+1}月</div>
        <button id="calNext" aria-label="次の月">›</button>
      </div>
      <div class="cal-dow">${dowCells}</div>
      <div class="cal-grid">${cells}</div>
      <div class="cal-foot">
        <span><span class="cal-dot" style="background:var(--shu)"></span>記録あり</span>
        <span><span class="cal-dot" style="background:${CAL_SAVED_COLOR}"></span>日報保存済み</span>
        <span class="cal-foot-r">この月 稼働 ${workDays}日</span>
      </div>
      <div class="actions" style="margin-top:8px">
        <button class="btn-ghost" id="calToday" style="flex:1">今日へ</button>
      </div>
    </div>`;
  document.getElementById("calPrev").onclick=()=>{ pickerMonth=new Date(y,mo-1,1); drawDatePicker(); };
  document.getElementById("calNext").onclick=()=>{ pickerMonth=new Date(y,mo+1,1); drawDatePicker(); };
  document.getElementById("calToday").onclick=()=>{ selDate=startOfDay(new Date()); closeSheet(); renderAll(); scrollToRelevant(); };
  sheetBody.querySelectorAll(".cal-cell[data-k]").forEach(b=>{
    b.onclick=()=>{ const [yy,mm,dd]=b.dataset.k.split("-").map(Number);
      selDate=new Date(yy,mm-1,dd); closeSheet(); renderAll(); scrollToRelevant(); };
  });
}

/* ============================================================
   カスタム時刻ピッカー（タップ→時→分の2タップで即セット）
============================================================ */
let tpActiveWrap=null;
function tfWrap(id,value,align){
  const v=value||"";
  const rc=align==="right"?" tf-right":"";
  return `<div class="tf-wrap${rc}"><button type="button" class="timefield${v?"":" empty"}" id="${id}" data-val="${v}">${v||"--:--"}</button><div class="tpick" hidden></div></div>`;
}
function tfDisabled(text){
  return `<div class="tf-wrap"><button type="button" class="timefield disabled" disabled>${esc(text||"--:--")}</button></div>`;
}
function getTF(id){ const el=document.getElementById(id); return el?(el.dataset.val||""):""; }
function initTF(root){
  tpActiveWrap=null;
  root.querySelectorAll(".tf-wrap .timefield:not(.disabled)").forEach(field=>{
    field.onclick=(ev)=>{ ev.stopPropagation(); toggleTP(field); };
  });
}
function closeTP(){
  if(!tpActiveWrap) return;
  const p=tpActiveWrap.querySelector(".tpick"); const f=tpActiveWrap.querySelector(".timefield");
  if(p){ p.hidden=true; p.innerHTML=""; } if(f) f.classList.remove("open");
  tpActiveWrap=null;
}
function toggleTP(field){
  const wrap=field.closest(".tf-wrap");
  if(tpActiveWrap===wrap){ closeTP(); return; }
  closeTP();
  tpActiveWrap=wrap; field.classList.add("open");
  const parts=(field.dataset.val||"").split(":");
  const h=parts[0]!==""&&parts[0]!==undefined?Number(parts[0]):null;
  const m=parts[1]!==""&&parts[1]!==undefined?Number(parts[1]):null;
  renderTPHours(field,h,m);
}
function renderTPHours(field,selH,selM){
  const p=field.closest(".tf-wrap").querySelector(".tpick");
  let cells="";
  for(let h=0;h<24;h++) cells+=`<button type="button" class="tp-cell${h===selH?" sel":""}" data-h="${h}">${String(h).padStart(2,"0")}</button>`;
  p.innerHTML=`<div class="tp-lab">時を選ぶ</div><div class="tp-grid">${cells}</div>`;
  p.hidden=false;
  p.querySelectorAll(".tp-cell").forEach(c=>c.onclick=(ev)=>{ ev.stopPropagation(); renderTPMins(field,Number(c.dataset.h),selM); });
}
function renderTPMins(field,h,selM){
  const p=field.closest(".tf-wrap").querySelector(".tpick");
  let cells="";
  for(let m=0;m<60;m+=5) cells+=`<button type="button" class="tp-cell${m===selM?" sel":""}" data-m="${m}">${String(m).padStart(2,"0")}</button>`;
  p.innerHTML=`<div class="tp-lab"><button type="button" class="tp-back" id="tpBack">‹</button>${String(h).padStart(2,"0")}時 → 分を選ぶ</div><div class="tp-grid">${cells}</div>`;
  p.querySelector("#tpBack").onclick=(ev)=>{ ev.stopPropagation(); renderTPHours(field,h,selM); };
  p.querySelectorAll(".tp-cell").forEach(c=>c.onclick=(ev)=>{ ev.stopPropagation();
    const val=String(h).padStart(2,"0")+":"+String(Number(c.dataset.m)).padStart(2,"0");
    field.dataset.val=val; field.textContent=val; field.classList.remove("empty");
    closeTP();
  });
}
document.addEventListener("click",()=>{ if(tpActiveWrap) closeTP(); });

/* ============================================================
   締め忘れの検知（前日以前の計測が止まっていない場合）
============================================================ */
function checkStaleRunning(){
  const run=runningEntry();
  if(!run) return false;
  if(isSameDay(new Date(run.start),new Date())) return false;   // 今日開始のものはそのまま
  openStaleFix(run);
  return true;   // 締め忘れあり
}
function openStaleFix(run){
  const cli=getClient(run.clientId);
  const sd=new Date(run.start);
  const startLabel=(sd.getMonth()+1)+"/"+sd.getDate()+" "+fmtTime(run.start);
  // 既定の終了：開始日の18:00。開始が18:00以降なら開始+30分(5分丸め)
  let def=new Date(sd.getFullYear(),sd.getMonth(),sd.getDate(),18,0,0,0);
  if(def.getTime()<=run.start){ let d2=new Date(run.start+30*60000); d2.setMinutes(Math.round(d2.getMinutes()/5)*5,0,0); def=d2; }
  sheetHead.innerHTML=`<h2>締め忘れの記録</h2>`;
  sheetBody.innerHTML=`
    <div class="hint" style="font-size:13px;line-height:1.7;color:var(--ink-soft);margin:4px 4px 10px">
      前回の計測が「停止」されないまま残っています。<br>
      <b style="color:var(--ink)">${esc((cli.code?cli.code+" ":"")+cli.name)}</b> ／ 開始 <b class="mono" style="color:var(--ink)">${startLabel}</b><br>
      終了時刻を入れて締めましょう。
    </div>
    <div class="field"><label>終了（${sd.getMonth()+1}/${sd.getDate()}）</label>${tfWrap("stEnd",fmtTime(def.getTime()))}</div>
    <div class="actions">
      <button class="btn-fill" id="stFix">この時刻で締める</button>
      <button class="btn-ghost" id="stKeep">そのまま続ける</button>
    </div>
    <div class="actions" style="margin-top:8px">
      <button class="btn-danger" id="stDel" style="flex:1">この記録を削除</button>
    </div>`;
  initTF(sheetBody);
  document.getElementById("stFix").onclick=()=>{
    const v=getTF("stEnd"); if(!v){ toast("終了時刻を入れてください"); return; }
    const [eh,em]=v.split(":").map(Number);
    let ed=new Date(sd.getFullYear(),sd.getMonth(),sd.getDate(),eh,em,0,0);
    if(ed.getTime()<=run.start) ed=new Date(ed.getTime()+86400000);   // 日跨ぎ
    run.end=ed.getTime(); markDayDirty(run.start); save(); closeSheet(); renderAll(); toast("締めました");
    autoSaveYesterday();          // 起動時にスキップされた自動保存をここで実行
  };
  document.getElementById("stKeep").onclick=()=>{ closeSheet(); };
  document.getElementById("stDel").onclick=()=>{
    if(!confirm("この計測記録を削除します。よろしいですか?")) return;
    markDayDirty(run.start);
    state.entries=state.entries.filter(x=>x.id!==run.id); save(); closeSheet(); renderAll(); toast("削除しました");
    autoSaveYesterday();          // 同上（「そのまま続ける」では進行中のまま保存したくないので呼ばない）
  };
  openSheet();
}

function renderClientPicker(){

/* ---- 空白タップ / ドラッグで記録を追加 ---- */
let dragSel=null, suppressGridClick=false;
function yToMs(y){
  const viewTop=startOfDay(selDate).getTime()+VIEW_START_H*3600000;
  let min=y/PX_MIN;
  min=Math.max(0,Math.min((VIEW_END_H-VIEW_START_H)*60,min));
  min=Math.round(min/5)*5;            // 5分刻みにスナップ
  return viewTop+min*60000;
}
grid.addEventListener("mousedown",ev=>{
  if(ev.button!==0) return;
  if(ev.target.closest(".block")) return;   // 既存ブロック上は対象外
  const rect=grid.getBoundingClientRect();
  dragSel={y0:ev.clientY-rect.top,ghost:null,moved:false};
});
window.addEventListener("mousemove",ev=>{
  if(!dragSel) return;
  const rect=grid.getBoundingClientRect();
  const y=ev.clientY-rect.top;
  if(Math.abs(y-dragSel.y0)>6) dragSel.moved=true;
  if(!dragSel.moved) return;
  if(!dragSel.ghost){ const g=document.createElement("div"); g.className="ghost"; grid.appendChild(g); dragSel.ghost=g; }
  dragSel.ghost.style.top=Math.min(y,dragSel.y0)+"px";
  dragSel.ghost.style.height=Math.max(8,Math.abs(y-dragSel.y0))+"px";
});
window.addEventListener("mouseup",ev=>{
  if(!dragSel) return;
  const st=dragSel; dragSel=null;
  if(st.ghost) st.ghost.remove();
  if(st.moved){
    suppressGridClick=true; setTimeout(()=>suppressGridClick=false,60);
    const rect=grid.getBoundingClientRect();
    const y1=ev.clientY-rect.top;
    let a=yToMs(Math.min(st.y0,y1)), b=yToMs(Math.max(st.y0,y1));
    if(b-a<5*60000) b=a+30*60000;
    openCreateEntry(a,b);
  }
});
grid.addEventListener("click",ev=>{
  if(suppressGridClick) return;                 // ドラッグ直後のclickは無視
  if(ev.target.closest(".block")) return;       // ブロックのタップは編集へ
  const rect=grid.getBoundingClientRect();
  const s=yToMs(ev.clientY-rect.top);
  openCreateEntry(s,s+30*60000);                // タップは仮に30分枠
});

function openCreateEntry(startMs,endMs){
  const cliOpts=state.clients.map(c=>`<option value="${c.id}">${esc((c.code?c.code+" ":"")+c.name)}</option>`).join("");
  sheetHead.innerHTML=`<button class="back" id="backNew">‹</button><h2>記録を追加</h2>`;
  sheetBody.innerHTML=`
    <div class="field"><label>顧問先</label><select id="nwCli">${cliOpts}</select></div>
    <div class="field"><label>業務内容</label><input id="nwTask" list="nwDL" placeholder="訪問・打合せ など" autocomplete="off"><datalist id="nwDL"></datalist></div>
    <div class="row2">
      <div class="field"><label>開始</label>${tfWrap("nwStart",fmtTime(startMs))}</div>
      <div class="field"><label>終了</label>${tfWrap("nwEnd",fmtTime(endMs),"right")}</div>
    </div>
    <div class="field"><label>メモ</label><textarea id="nwMemo" rows="2" placeholder="用件・申し送りなど"></textarea></div>
    <div class="actions">
      <button class="btn-fill" id="nwSave">追加</button>
      <button class="btn-ghost" id="nwCancel">キャンセル</button>
    </div>`;
  document.getElementById("backNew").onclick=closeSheet;
  document.getElementById("nwCancel").onclick=closeSheet;
  const fillDL=()=>{ const c=getClient(document.getElementById("nwCli").value);
    document.getElementById("nwDL").innerHTML=state.tasks[taskSetFor(c)].map(t=>`<option value="${esc(t)}">`).join(""); };
  document.getElementById("nwCli").onchange=fillDL; fillDL();
  initTF(sheetBody);
  document.getElementById("nwSave").onclick=()=>{
    const sv=getTF("nwStart"), evv=getTF("nwEnd");
    if(!sv||!evv){ toast("時刻を入力してください"); return; }
    const base=startOfDay(selDate);
    const p=v=>{ const [h,m]=v.split(":").map(Number); return new Date(base.getFullYear(),base.getMonth(),base.getDate(),h||0,m||0).getTime(); };
    let s=p(sv), e2=p(evv); if(e2<=s) e2+=86400000;   // 日跨ぎ
    state.entries.push({id:uid(),clientId:document.getElementById("nwCli").value,
      task:document.getElementById("nwTask").value.trim(),start:s,end:e2,
      memo:document.getElementById("nwMemo").value});
    markDayDirty(s);
    save(); closeSheet(); renderAll(); toast("記録を追加しました");
  };
  openSheet();
}

/* ---- エントリ編集 ---- */
function openEditEntry(id){
  const e=state.entries.find(x=>x.id===id); if(!e)return;
  const cli=getClient(e.clientId);
  const running=e.end===null;
  const dayStr=(()=>{ const d=new Date(e.start); return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0"); })();
  sheetHead.innerHTML=`<button class="back" id="backEdit">‹</button><h2>記録を修正</h2>`;
  document.getElementById("backEdit").onclick=closeSheet;

  const cliOpts=state.clients.map(c=>`<option value="${c.id}" ${c.id===e.clientId?"selected":""}>${esc((c.code?c.code+" ":"")+c.name)}</option>`).join("");
  sheetBody.innerHTML=`
    <div class="field"><label>顧問先</label><select id="edCli">${cliOpts}</select></div>
    <div class="field"><label>業務内容</label>
      <input id="edTask" list="taskDL" value="${esc(e.task||"")}" autocomplete="off">
      <datalist id="taskDL"></datalist>
    </div>
    <div class="row2">
      <div class="field"><label>開始</label>${tfWrap("edStart",fmtTime(e.start))}</div>
      <div class="field"><label>終了</label>${running?tfDisabled("進行中"):tfWrap("edEnd",e.end?fmtTime(e.end):"","right")}</div>
    </div>
    ${running?`<div class="hint">この記録は進行中です。終了時刻は「停止」で確定します。</div>`:""}
    <div class="field"><label>メモ</label><textarea id="edMemo" rows="3" placeholder="この作業のメモ(申し送り・次回確認事項など)">${esc(e.memo||"")}</textarea></div>
    <div class="actions">
      <button class="btn-fill" id="edSave">保存</button>
      ${running?`<button class="btn-ghost" id="edStop">停止</button>`:""}
    </div>
    <div class="actions" style="margin-top:8px">
      ${!running?`<button class="btn-ghost" id="edDup" style="flex:1">複製</button>`:""}
      <button class="btn-danger" id="edDel" style="flex:1">削除</button>
    </div>`;
  // datalist を顧問先種別に追随
  const fillDL=()=>{ const c=getClient(document.getElementById("edCli").value); const set=state.tasks[taskSetFor(c)];
    document.getElementById("taskDL").innerHTML=set.map(t=>`<option value="${esc(t)}">`).join(""); };
  document.getElementById("edCli").onchange=fillDL; fillDL();
  initTF(sheetBody);

  document.getElementById("edSave").onclick=()=>{
    e.clientId=document.getElementById("edCli").value;
    e.task=document.getElementById("edTask").value.trim();
    e.memo=document.getElementById("edMemo").value;
    const sv=getTF("edStart"); if(!sv){ toast("開始時刻を入れてください"); return; }
    const [sh,sm]=sv.split(":").map(Number);
    const base=dayStr.split("-").map(Number);
    const sd=new Date(base[0],base[1]-1,base[2],sh||0,sm||0,0,0); e.start=sd.getTime();
    if(!running){
      const ev=getTF("edEnd");
      if(ev){ const [eh,em]=ev.split(":").map(Number); let ed=new Date(base[0],base[1]-1,base[2],eh,em,0,0);
        if(ed.getTime()<e.start) ed=new Date(ed.getTime()+86400000); // 日跨ぎ
        e.end=ed.getTime(); }
    }
    markDayDirty(e.start);
    save(); closeSheet(); renderAll(); toast("修正を保存しました");
  };
  const stopEl=document.getElementById("edStop"); if(stopEl) stopEl.onclick=()=>{ e.end=Date.now(); markDayDirty(e.start); save(); closeSheet(); renderAll(); toast("計測を停止しました"); };
  const dupEl=document.getElementById("edDup"); if(dupEl) dupEl.onclick=()=>{
    const dur=(e.end||Date.now())-e.start;                 // 同じ長さ
    const ns=e.end||Date.now(), ne=ns+dur;                 // 直後に配置
    state.entries.push({id:uid(),clientId:e.clientId,task:e.task,start:ns,end:ne,memo:e.memo||""});
    markDayDirty(ns);
    save(); closeSheet(); renderAll(); toast("複製しました（直後に配置）");
  };
  document.getElementById("edDel").onclick=()=>{
    markDayDirty(e.start);
    state.entries=state.entries.filter(x=>x.id!==e.id); save(); closeSheet(); renderAll(); toast("記録を削除しました");
  };
  openSheet();
}

   右パネル：メモ / 日報
============================================================ */
const sideEl=document.getElementById("side");
function autoGrow(t){ t.style.height="auto"; t.style.height=Math.max(32,t.scrollHeight+2)+"px"; }
function renderSide(){
  const key=dateKey(selDate);
  const now=Date.now();
  const dayEntries=state.entries.filter(e=>isSameDay(new Date(e.start),selDate)).sort((a,b)=>a.start-b.start);
  let total=0; dayEntries.forEach(e=>total+=((e.end||now)-e.start)/60000);

  sideEl.innerHTML=`
    <div class="side-head"><h3>${(selDate.getMonth()+1)}/${selDate.getDate()} のメモ</h3><span class="side-total mono" id="sideTotal">${fmtDur(total)}</span></div>
    <textarea class="day-memo" id="dayMemo" placeholder="今日の全体メモ(申し送り・TODO・電話予定など)"></textarea>
    <div class="side-label">作業ごとのメモ</div>
    <div id="logRows"></div>`;

  const dm=document.getElementById("dayMemo");
  dm.value=state.dayMemos[key]||"";
  dm.addEventListener("input",()=>{ state.dayMemos[key]=dm.value;
    markKeyDirty(key);   // 日報の所感欄が変わる→再保存対象に
    save(); });

  const rows=document.getElementById("logRows");
  if(dayEntries.length===0){
    rows.innerHTML=`<div class="hint" style="padding:2px 6px">記録が入ると、ここに作業が時系列で並びます。各作業の右にメモを残せます(「資料お預かり」「次回◯◯確認」など)。</div>`;
    return;
  }
  const run=runningEntry();
  for(const e of dayEntries){
    const c=getClient(e.clientId); const end=e.end||now; const dur=(end-e.start)/60000;
    const isRun=e.end===null;
    const row=document.createElement("div"); row.className="log-row"+(isRun?" running":"");
    row.innerHTML=`
      <div class="log-top">
        <span class="log-dot" style="background:${c.color}"></span>
        <span class="log-time mono">${fmtTime(e.start)}–${e.end?fmtTime(end):"…"}</span>
        <span class="log-cli">${esc((c.code?c.code+" ":"")+c.name)}</span>
        <span class="log-dur mono"${isRun?' id="runLogDur"':""}>${fmtDurShort(dur)}</span>
      </div>
      <div class="log-task">${esc(e.task||"(業務未設定)")}</div>`;
    const memo=document.createElement("textarea");
    memo.className="log-memo"; memo.placeholder="メモを追加…"; memo.value=e.memo||"";
    memo.addEventListener("input",()=>{ e.memo=memo.value; markDayDirty(e.start); save(); autoGrow(memo); });
    row.querySelector(".log-top").onclick=()=>openEditEntry(e.id);
    row.querySelector(".log-task").onclick=()=>openEditEntry(e.id);
    row.appendChild(memo);
    rows.appendChild(row);
    autoGrow(memo);
  }
}

/* ============================================================
   日報の書き出し（Obsidian / メール向け）
============================================================ */
function buildReport(date, fmt){
  const md = fmt!=="plain";
  const now=Date.now();
  const key=dateKey(date);
  const entries=state.entries.filter(e=>isSameDay(new Date(e.start),date)).sort((a,b)=>a.start-b.start);
  const dateStr=date.getFullYear()+"-"+String(date.getMonth()+1).padStart(2,"0")+"-"+String(date.getDate()).padStart(2,"0")+"（"+DOW[date.getDay()]+"）";
  let total=0; entries.forEach(e=>total+=((e.end||now)-e.start)/60000);

  const memoLines=(txt,indent)=>String(txt||"").split(/\r?\n/).map(s=>s.trim()).filter(Boolean).map(s=>indent+s);

  const L=[];
  if(md){
    L.push("# 業務日報 "+dateStr,"","**合計 "+fmtDur(total)+"**","");
    L.push("## 作業記録");
    if(entries.length===0) L.push("（記録なし）");
    for(const e of entries){
      const c=getClient(e.clientId); const end=e.end||now; const dur=(end-e.start)/60000;
      const cli=(c.code?c.code+" ":"")+c.name;
      const et=e.end?fmtTime(end):"進行中";
      L.push(`- **${fmtTime(e.start)}–${et}**（${fmtDur(dur)}）${cli}${e.task?" ｜ "+e.task:""}`);
      memoLines(e.memo,"  - ").forEach(x=>L.push(x));
    }
  }else{
    L.push("■ 業務日報 "+dateStr,"合計 "+fmtDur(total),"","【作業記録】");
    if(entries.length===0) L.push("（記録なし）");
    for(const e of entries){
      const c=getClient(e.clientId); const end=e.end||now; const dur=(end-e.start)/60000;
      const cli=(c.code?c.code+" ":"")+c.name;
      const et=e.end?fmtTime(end):"進行中";
      L.push(`${fmtTime(e.start)}–${et}（${fmtDur(dur)}）${cli}${e.task?" ｜ "+e.task:""}`);
      memoLines(e.memo,"  ・").forEach(x=>L.push(x));
    }
  }

  // 内訳（顧問先別合計）
  const byCli=new Map();
  for(const e of entries){ const end=e.end||now; const m=(end-e.start)/60000;
    const c=getClient(e.clientId); const lab=(c.code?c.code+" ":"")+c.name;
    byCli.set(lab,(byCli.get(lab)||0)+m); }
  if(byCli.size){
    L.push("", md?"## 内訳":"【内訳】");
    [...byCli.entries()].sort((a,b)=>b[1]-a[1]).forEach(([lab,m])=>L.push((md?"- ":"")+lab+" … "+fmtDur(m)));
  }

  // 所感・申し送り（日メモ）
  const dm=(state.dayMemos[key]||"").trim();
  if(dm){ L.push("", md?"## 所感・申し送り":"【所感・申し送り】", dm); }

  return L.join("\n");
}

let exportFmt="md";

const TT_MARK_START = "<!-- time-tracker -->";
const TT_MARK_END   = "<!-- /time-tracker -->";

async function refreshFsRow(){
  const row=document.getElementById("fsRow"); if(!row) return;
  let dir=null; try{ dir=await idbGet("vaultDir"); }catch(e){}
  if(dir){
    row.innerHTML=`保存先：<b>${esc(dir.name)}</b> フォルダ<button class="lk" id="fsChg">変更</button>`;
    row.querySelector("#fsChg").onclick=async()=>{ const nd=await pickVaultDir(); if(nd){ toast("保存先を変更しました"); refreshFsRow(); } };
  }else{
    row.innerHTML=`保存先フォルダ未設定<button class="lk" id="fsSet">フォルダを選ぶ</button>`;
    row.querySelector("#fsSet").onclick=async()=>{ const nd=await pickVaultDir(); if(nd){ toast("保存先を設定しました"); refreshFsRow(); } };
  }
}
function copyText(txt, el){
  const done=()=>toast("コピーしました");
  const fail=()=>{ if(el){ el.focus(); el.select(); } toast("コピーできませんでした。長押しで選択してください"); };
  if(navigator.clipboard&&navigator.clipboard.writeText){
    navigator.clipboard.writeText(txt).then(done).catch(()=>{
      try{ if(el){ el.focus(); el.select(); document.execCommand("copy"); done(); } else fail(); }catch(e){ fail(); }
    });
  }else{
    try{ if(el){ el.focus(); el.select(); document.execCommand("copy"); done(); } else fail(); }catch(e){ fail(); }
  }
}

/* ---- Obsidian 直接保存（File System Access API） ---- */
function idbOpen(){
  return new Promise((res,rej)=>{
    const r=indexedDB.open("tt-fs",1);
    r.onupgradeneeded=()=>{ if(!r.result.objectStoreNames.contains("h")) r.result.createObjectStore("h"); };
    r.onsuccess=()=>res(r.result); r.onerror=()=>rej(r.error);
  });
}
async function idbSet(key,val){ const db=await idbOpen(); return new Promise((res,rej)=>{ const tx=db.transaction("h","readwrite"); tx.objectStore("h").put(val,key); tx.oncomplete=()=>res(); tx.onerror=()=>rej(tx.error); }); }
async function idbGet(key){ const db=await idbOpen(); return new Promise((res,rej)=>{ const tx=db.transaction("h","readonly"); const g=tx.objectStore("h").get(key); g.onsuccess=()=>res(g.result); g.onerror=()=>rej(g.error); }); }
async function pickVaultDir(){
  try{ const dir=await window.showDirectoryPicker({mode:"readwrite",id:"tt-vault"}); await idbSet("vaultDir",dir); return dir; }
  catch(e){ return null; }   // キャンセル含む
}
async function ensurePermission(handle){
  const opts={mode:"readwrite"};
  if((await handle.queryPermission(opts))==="granted") return true;
  if((await handle.requestPermission(opts))==="granted") return true;
  return false;
}
async function writeReportToDir(dir, d){
  const fname=dateKey(d)+".md";
  const report=buildReport(d,"md");
  const block=TT_MARK_START+"\n"+report+"\n"+TT_MARK_END;
  const fh=await dir.getFileHandle(fname,{create:true});
  let existing=""; try{ const f=await fh.getFile(); existing=await f.text(); }catch(e){}
  let out;
  const s=existing.indexOf(TT_MARK_START), en=existing.indexOf(TT_MARK_END);
  if(s!==-1 && en!==-1 && en>s){                       // 既存の日報ブロックだけ差し替え（手書き部分は保持）
    out=existing.slice(0,s)+block+existing.slice(en+TT_MARK_END.length);
  }else if(existing.trim()){                            // 手書きノートがあれば末尾に追記
    out=existing.replace(/\s*$/,"")+"\n\n"+block+"\n";
  }else{
    out=block+"\n";
  }
  const w=await fh.createWritable(); await w.write(out); await w.close();
  return fname;
}
async function saveToObsidian(d){
  if(!FS_SUPPORTED){ toast("この端末では直接保存に非対応です"); return; }
  try{
    let dir=await idbGet("vaultDir");
    if(!dir){ dir=await pickVaultDir(); if(!dir) return; refreshFsRow(); }
    if(!(await ensurePermission(dir))){ toast("フォルダへの書き込みが許可されませんでした"); return; }
    const fname=await writeReportToDir(dir,d);
    state.savedDays[dateKey(d)]=true;
    if(state.resaveDays) delete state.resaveDays[dateKey(d)];
    save();
    toast(fname+" に保存しました");
  }catch(e){
    toast("保存できませんでした（フォルダの許可を確認）");
  }
}

/* ---- 翌日起動時：締め忘れが無ければ前日分（未保存の過去日）を自動保存 ---- */
function unsavedPastDays(){
  const today=startOfDay(new Date()).getTime();
  const set=new Set();
  for(const e of state.entries){
    const t=startOfDay(new Date(e.start)).getTime();
    if(t<today && t>=today-7*86400000){                // 直近7日以内の過去日
      const k=dateKey(new Date(e.start));
      if(!state.savedDays[k]) set.add(k);
    }
  }
  // 一度保存された後に修正された日は、何日前でも再保存対象（ふりかえりでの過去修正に対応）
  if(state.resaveDays) for(const k of Object.keys(state.resaveDays)){
    if(dayFromKey(k).getTime()<today) set.add(k);
  }
  return [...set].sort();
}
async function autoSaveYesterday(){
  if(!FS_SUPPORTED) return;
  const days=unsavedPastDays();
  if(days.length===0) return;
  let dir=null; try{ dir=await idbGet("vaultDir"); }catch(e){}
  if(!dir) return;                                      // 保存先未設定なら何もしない（初回は手動保存で設定）
  let perm="prompt"; try{ perm=await dir.queryPermission({mode:"readwrite"}); }catch(e){}
  if(perm==="granted"){                                 // 許可が残っていれば完全自動
    let n=0; const done=[];
    for(const k of days){ try{ await writeReportToDir(dir,dayFromKey(k)); state.savedDays[k]=true; if(state.resaveDays) delete state.resaveDays[k]; n++; done.push(k); }catch(e){} }
    if(n){ save(); toast(n>1?`未保存の日報を${n}日分保存しました（${fmtDayList(done)}）`:`${fmtDayList(done)} の日報を保存しました`); }
  }else{
    showSaveBanner(days, dir);                          // 許可にタップが要る → 1タップ保存を促す
  }
}
function dayFromKey(k){ const [y,mo,da]=k.split("-").map(Number); return new Date(y,mo-1,da); }
function fmtDayList(days){
  const f=k=>{ const [,m,d]=k.split("-").map(Number); return `${m}/${d}`; };
  if(days.length<=4) return days.map(f).join("・");
  return days.slice(0,3).map(f).join("・")+` ほか${days.length-3}日`;
}
function showSaveBanner(days, dir){
  const b=document.getElementById("banner"); if(!b) return;
  bannerPending={days,dir};
  const txt=document.getElementById("bnTxt");
  const setLabel=()=>{ txt.textContent = days.length>1
      ? `未保存の日報が${days.length}日分あります（${fmtDayList(days)}）`
      : `${fmtDayList(days)} の日報をObsidianに保存できます`; };
  setLabel();
  b.hidden=false;
  const go=document.getElementById("bnGo");
  go.onclick=async()=>{
    go.disabled=true; txt.textContent="保存中…";
    try{
      let d=dir; if(!d){ d=await idbGet("vaultDir"); }
      if(!d){ d=await pickVaultDir(); if(!d){ setLabel(); go.disabled=false; return; } }
      // 許可を取得（再読み込み後はここで1回だけEdgeが確認を出す）
      let ok=(await d.queryPermission({mode:"readwrite"}))==="granted";
      if(!ok) ok=(await d.requestPermission({mode:"readwrite"}))==="granted";
      if(!ok){ txt.textContent="許可されませんでした。もう一度「保存」を押してください"; go.disabled=false; return; }
      let n=0; const failed=[];
      for(const k of days){ try{ await writeReportToDir(d,dayFromKey(k)); state.savedDays[k]=true; if(state.resaveDays) delete state.resaveDays[k]; n++; }catch(e){ failed.push(k); } }
      save();
      if(failed.length===0){ txt.textContent="保存しました"; b.hidden=true; bannerPending=null; toast(n>1?`${n}日分を保存しました`:`${fmtDayList(days)} を保存しました`); }
      else{ txt.textContent=`${n}日分保存／失敗: ${fmtDayList(failed)}（もう一度お試しください）`; go.disabled=false; }
    }catch(e){
      txt.textContent="保存できませんでした。もう一度お試しください"; go.disabled=false;
    }
  };
  document.getElementById("bnX").onclick=()=>{ b.hidden=true; bannerPending=null; };
}

function monthCellData(year,month){
  // day番号 -> {min,count,byClient:Map(clientId->min)}  … 俯瞰カレンダー用
  const now=Date.now(); const m=new Map();
  for(const e of state.entries){
    const d=new Date(e.start);
    if(d.getFullYear()!==year||d.getMonth()!==month) continue;
    const day=d.getDate();
    let o=m.get(day); if(!o){ o={min:0,count:0,byClient:new Map()}; m.set(day,o); }
    const mn=((e.end||now)-e.start)/60000;
    o.min+=mn; o.count++;
    o.byClient.set(e.clientId,(o.byClient.get(e.clientId)||0)+mn);
  }
  return m;
}

function renderAnalysis(){
  if(appView!=="analysis") return;
  const now=Date.now();
  const y=anaMonth.getFullYear(), mo=anaMonth.getMonth();
  const scoped=state.entries.filter(e=>{ const d=new Date(e.start); return d.getFullYear()===y&&d.getMonth()===mo; });
  const byCli=new Map(), byCliTravel=new Map(), byTask=new Map();
  let total=0, travelTotal=0; const daySet=new Set();
  for(const e of scoped){
    const min=((e.end||now)-e.start)/60000; total+=min;
    byCli.set(e.clientId,(byCli.get(e.clientId)||0)+min);
    if(isTravelTask(e.task)){ travelTotal+=min; byCliTravel.set(e.clientId,(byCliTravel.get(e.clientId)||0)+min); }
    const key=e.task||"(未設定)"; byTask.set(key,(byTask.get(key)||0)+min);
    daySet.add(dateKey(new Date(e.start)));
  }
  const cliRows=[...byCli.entries()].sort((a,b)=>b[1]-a[1]);
  const taskRows=[...byTask.entries()].sort((a,b)=>b[1]-a[1]);
  const max=Math.max(1,...cliRows.map(r=>r[1]));
  const tmax=Math.max(1,...taskRows.map(r=>r[1]));
  const nCli=cliRows.filter(([cid])=>getClient(cid).kind==="client").length;

  // 選択日の初期化: 今月なら今日、そうでなければ記録のある最後の日
  const prefix=`${y}-${String(mo+1).padStart(2,"0")}`;
  if(!anaSelDay || !anaSelDay.startsWith(prefix)){
    const todayKey=dateKey(new Date());
    if(todayKey.startsWith(prefix)) anaSelDay=todayKey;
    else{ const ds=[...daySet].sort(); anaSelDay=ds.length?ds[ds.length-1]:null; }
  }

  let html=`
    <div class="ana-nav">
      <button id="anaPrev" aria-label="前の月">‹</button>
      <div class="ana-title">${y}年${mo+1}月</div>
      <button id="anaNext" aria-label="次の月">›</button>
      <button class="ana-this" id="anaThis">今月へ</button>
    </div>
    <div class="ana-hero">
      <span class="ana-total">${fmtDur(total)}</span>
      ${travelTotal>0?`<span class="ana-travel">うち移動 ${fmtDur(travelTotal)}</span>`:""}
      <span class="ana-meta">稼働 ${daySet.size}日 ・ ${scoped.length}件 ・ 顧問先 ${nCli}件
        ${cliRows.length?`<button class="sum-copy" id="anaCopy">コピー</button>`:""}</span>
    </div>
    <div class="ana-main">
      <div class="ana-card"><h4>月間カレンダー</h4>${drawOverviewHTML(y,mo)}</div>
      <div class="ana-card ana-day-card" id="anaDayCard"></div>
    </div>`;

  if(cliRows.length){
    html+=`<div class="ana-two"><div class="ana-card"><h4>顧問先別 <span class="sub">— タップで履歴、薄色＝移動</span></h4>`;
    for(const [cid,min] of cliRows){ const c=getClient(cid);
      const tr=byCliTravel.get(cid)||0;
      const workW=((min-tr)/max*100).toFixed(1), trW=(tr/max*100).toFixed(1);
      const tip=tr>0?` title="${esc((c.code?c.code+" ":"")+c.name)} ${fmtDur(min)}（うち移動 ${fmtDur(tr)}）"`:"";
      html+=`<div class="sum-row clickable" data-cid="${cid}"${tip}><span class="sum-dot" style="background:${c.color}"></span>
        <span class="sum-name">${esc((c.code?c.code+" ":"")+c.name)}</span>
        <span class="sum-bar-wrap"><span class="sum-bar" style="width:${workW}%;background:${c.color}"></span>${tr>0?`<span class="sum-bar travel" style="width:${trW}%;background:${c.color}"></span>`:""}</span>
        <span class="sum-time mono">${fmtDurShort(min)}</span></div>`; }
    html+=`</div><div class="ana-card"><h4>業務別</h4>`;
    for(const [t,min] of taskRows){
      html+=`<div class="sum-row"><span class="sum-dot" style="background:var(--rule-strong)"></span>
        <span class="sum-name">${esc(t)}</span>
        <span class="sum-bar-wrap"><span class="sum-bar" style="width:${(min/tmax*100).toFixed(1)}%;background:var(--figure)"></span></span>
        <span class="sum-time mono">${fmtDurShort(min)}</span></div>`; }
    html+=`</div></div>`;
  }else{
    html+=`<div class="ana-card"><div class="hint" style="margin:2px">この月の記録はまだありません。</div></div>`;
  }
  anaInner.innerHTML=html;

  document.getElementById("anaPrev").onclick=()=>{ anaMonth=new Date(y,mo-1,1); anaSelDay=null; renderAnalysis(); };
  document.getElementById("anaNext").onclick=()=>{ anaMonth=new Date(y,mo+1,1); anaSelDay=null; renderAnalysis(); };
  document.getElementById("anaThis").onclick=()=>{ const n=new Date(); anaMonth=new Date(n.getFullYear(),n.getMonth(),1); anaSelDay=null; renderAnalysis(); };
  const cp=document.getElementById("anaCopy");
  if(cp) cp.onclick=()=>copyText(buildMonthSummaryText(anaMonth,cliRows),null);
  anaInner.querySelectorAll(".sum-row.clickable").forEach(el=>el.onclick=()=>openClientHistory(el.dataset.cid));
  anaInner.querySelectorAll(".ov-cell[data-k]").forEach(b=>b.onclick=()=>selectAnaDay(b.dataset.k));
  renderAnaDay();
}

/* ---- 月間カレンダー（合計＋顧問先別ミニ棒グラフ＋週計） ---- */
function drawOverviewHTML(y,mo){
  const data=monthCellData(y,mo);
  const lead=new Date(y,mo,1).getDay();
  const dim=new Date(y,mo+1,0).getDate();
  const todayKey=dateKey(new Date());

  // スケール類（すべて月内基準）
  let maxSeg=0, maxDay=0;
  data.forEach(o=>{ if(o.min>maxDay)maxDay=o.min; o.byClient.forEach(mn=>{ if(mn>maxSeg)maxSeg=mn; }); });
  const full=Math.max(120,maxSeg);   // 棒のフル幅＝月内最大の塊（下限2hで暴れ防止）

  const dowCells=["日","月","火","水","木","金","土"]
    .map((w,i)=>`<span class="${i===0?"sun":i===6?"sat":""}">${w}</span>`).join("")
    +`<span>週計</span>`;

  // 週単位で組み立て（先頭・末尾は空白で7の倍数に揃える）
  const slots=[];
  for(let i=0;i<lead;i++) slots.push(null);
  for(let d=1;d<=dim;d++) slots.push({d,k:dateKeyOf(y,mo,d),o:data.get(d)});
  while(slots.length%7) slots.push(null);

  // 1パス目: 週合計
  const wkMins=[];
  for(let ws=0;ws<slots.length;ws+=7){
    let m=0; for(let i=0;i<7;i++){ const s=slots[ws+i]; if(s&&s.o) m+=s.o.min; }
    wkMins.push(m);
  }
  const maxWeek=Math.max(1,...wkMins);

  // 2パス目: 描画
  let grid="";
  for(let ws=0, w=0; ws<slots.length; ws+=7, w++){
    for(let i=0;i<7;i++){
      const s=slots[ws+i];
      if(!s){ grid+=`<div class="ov-cell blank"></div>`; continue; }
      const {d,k,o}=s;
      const cls=["ov-cell"]; if(!o)cls.push("empty");
      if(k===anaSelDay)cls.push("sel"); if(k===todayKey)cls.push("today");
      const numCls=(i===0?"sun":i===6?"sat":"")+(o?"":" dim");
      let inner=""; let title=`${mo+1}/${d} 記録なし`;
      if(o){
        const segs=[...o.byClient.entries()].sort((x,z)=>z[1]-x[1]);
        const saved=!!(state.savedDays&&state.savedDays[k]);
        const isPast=k<todayKey;
        const sdot = isPast||saved ? `<span class="ov-sdot" style="background:${saved?CAL_SAVED_COLOR:"var(--shu)"}"></span>` : "";
        const heatA=(0.06+0.26*(o.min/Math.max(1,maxDay))).toFixed(3);   // 0.06〜0.32 少し起こした墨
        const rows=segs.slice(0,4).map(([cid,mn])=>{ const c=getClient(cid);
          return `<span class="ov-cr"><i class="ov-cc" style="color:${c.color}">${esc(c.code||c.name.slice(0,3))}</i><i class="ov-cb"><b style="width:${Math.min(100,mn/full*100).toFixed(1)}%;background:${c.color}"></b></i></span>`;
        }).join("");
        const more=segs.length>4?`<span class="ov-more">ほか${segs.length-4}件</span>`:"";
        inner=`<span class="ov-heat" style="background:rgba(30,42,56,${heatA})"></span>`
            +`<span class="ov-r1"><span class="ov-num ${numCls}">${d}</span><span class="ov-st">${sdot}<span class="ov-cnt">${o.count}</span></span></span>`
            +`<span class="ov-tot">${fmtDurShort(o.min)}</span>`
            +`<span class="ov-rows">${rows}${more}</span>`;
        title=`${mo+1}/${d} ${fmtDur(o.min)}・${o.count}件${saved?"・日報保存済み":(isPast?"・日報未保存":"")}`
            + segs.map(([cid,mn])=>{ const c=getClient(cid); return `&#10;${(c.code?c.code+" ":"")+c.name} ${fmtDurShort(mn)}`; }).join("");
      }else{
        inner=`<span class="ov-r1"><span class="ov-num ${numCls}">${d}</span></span>`;
      }
      grid+=`<button class="${cls.join(" ")}" data-k="${k}" title="${title}">${inner}</button>`;
    }
    const wm=wkMins[w];
    grid+=`<div class="ov-wk">${wm
      ?`<b>${fmtDurShort(wm)}</b><span class="ov-wkbar"><b style="width:${(wm/maxWeek*100).toFixed(1)}%"></b></span>`
      :`<span class="dim">–</span>`}</div>`;
  }

  return `<div class="ov">
      <div class="ov-dow">${dowCells}</div>
      <div class="ov-grid">${grid}</div>
      <div class="ov-foot">
        <span><span class="dotc" style="background:${CAL_SAVED_COLOR}"></span>日報保存済み</span>
        <span><span class="dotc" style="background:var(--shu)"></span>未保存</span>
        <span>／ 棒＝顧問先別の時間、濃さ＝日の合計、右端＝週計（ホバーで内訳）</span>
      </div>
    </div>`;
}

function selectAnaDay(k){

function renderAnaDay(){
  const card=document.getElementById("anaDayCard"); if(!card) return;
  const k=anaSelDay;
  if(!k){ card.innerHTML=`<h4>日の詳細</h4><div class="hint" style="margin:2px">カレンダーの日をタップすると、その日の作業とメモがここに表示されます。</div>`; return; }
  const d=dayFromKey(k);
  const now=Date.now();
  const list=state.entries.filter(e=>isSameDay(new Date(e.start),d)).sort((a,b)=>a.start-b.start);
  let total=0; list.forEach(e=>total+=((e.end||now)-e.start)/60000);

    <div class="side-label">作業ごとのメモ</div>

  document.getElementById("anaOpenDay").onclick=()=>{ selDate=startOfDay(d); setView("log"); };

  const dm=document.getElementById("anaDayMemo");
  dm.value=state.dayMemos[k]||"";
  dm.addEventListener("input",()=>{ state.dayMemos[k]=dm.value;

    save(); });

  const rows=document.getElementById("anaDayRows");
  if(list.length===0){
    rows.innerHTML=`<div class="hint" style="padding:2px 6px">この日の記録はありません。</div>`;
    return;
  }
  for(const e of list){
    const c=getClient(e.clientId); const end=e.end||now; const dur=(end-e.start)/60000;
    const isRun=e.end===null;
    const row=document.createElement("div"); row.className="log-row"+(isRun?" running":"");
    row.innerHTML=`
      <div class="log-top">
        <span class="log-dot" style="background:${c.color}"></span>
        <span class="log-time mono">${fmtTime(e.start)}–${e.end?fmtTime(end):"…"}</span>
        <span class="log-cli">${esc((c.code?c.code+" ":"")+c.name)}</span>
        <span class="log-dur mono">${fmtDurShort(dur)}</span>
      </div>
      <div class="log-task">${esc(e.task||"(業務未設定)")}</div>`;
    const memo=document.createElement("textarea");
    memo.className="log-memo"; memo.placeholder="メモを追加…"; memo.value=e.memo||"";
    memo.addEventListener("input",()=>{ e.memo=memo.value; markDayDirty(e.start); save(); autoGrow(memo); });
    row.querySelector(".log-top").onclick=()=>openEditEntry(e.id);
    row.querySelector(".log-task").onclick=()=>openEditEntry(e.id);
    row.appendChild(memo);
    rows.appendChild(row);
    autoGrow(memo);
  }
}
function buildMonthSummaryText(d, cliRows){
  // その月の移動時間を顧問先別に集計
  const now=Date.now(); const trMap=new Map(); let trTotal=0;
  for(const e of state.entries){
    const ed=new Date(e.start);
    if(ed.getFullYear()!==d.getFullYear()||ed.getMonth()!==d.getMonth()) continue;
    if(!isTravelTask(e.task)) continue;
    const m=((e.end||now)-e.start)/60000;
    trMap.set(e.clientId,(trMap.get(e.clientId)||0)+m); trTotal+=m;
  }
  const L=[`${d.getFullYear()}年${d.getMonth()+1}月 工数（顧問先別）`];
  let total=0;
  for(const [cid,min] of cliRows){ const c=getClient(cid); total+=min;
    const tr=trMap.get(cid)||0;
    L.push(`${(c.code?c.code+" ":"")+c.name} … ${fmtDur(min)}${tr>0?`（うち移動 ${fmtDur(tr)}）`:""}`); }
  L.push(`合計 … ${fmtDur(total)}${trTotal>0?`（うち移動 ${fmtDur(trTotal)}）`:""}`);
  return L.join("\n");
}

/* ============================================================
   ④ 顧問先で絞って履歴（集計パネルの行タップで開く）
============================================================ */
let chPeriod="month";   // "month" | "prev" | "3m" | "all"
let chView="list";      // "list"(一覧) | "day"(日別) | "sum"(集計)
function chRange(){
  const t=startOfDay(new Date());
  const y=t.getFullYear(), mo=t.getMonth();
  if(chPeriod==="month") return {s:new Date(y,mo,1).getTime(), e:new Date(y,mo+1,1).getTime(), label:`${mo+1}月`};
  if(chPeriod==="prev")  return {s:new Date(y,mo-1,1).getTime(), e:new Date(y,mo,1).getTime(), label:`${new Date(y,mo-1,1).getMonth()+1}月`};
  if(chPeriod==="3m")    return {s:new Date(y,mo-2,1).getTime(), e:new Date(y,mo+1,1).getTime(), label:"直近3ヶ月"};
  return {s:-Infinity, e:Infinity, label:"全期間"};
}
function openClientHistory(clientId){
  const c=getClient(clientId);
  drawClientHistory(c); openSheet();
}
function drawClientHistory(c){
  const now=Date.now();
  const r=chRange();
  const rows=state.entries
    .filter(e=>e.clientId===c.id && e.start>=r.s && e.start<r.e)
    .sort((a,b)=>a.start-b.start);
  let total=0, chTravel=0; const daySet=new Set(); const byTask=new Map();
  for(const e of rows){
    const m=((e.end||now)-e.start)/60000; total+=m;
    if(isTravelTask(e.task)) chTravel+=m;
    daySet.add(dateKey(new Date(e.start)));
    const k=e.task||"(未設定)"; byTask.set(k,(byTask.get(k)||0)+m);
  }

  sheetHead.innerHTML=`<button class="back" id="chBack">‹</button><h2>顧問先の履歴</h2>`;
  const chips=[["month","今月"],["prev","先月"],["3m","3ヶ月"],["all","全期間"]]
    .map(([k,l])=>`<button class="ch-chip${chPeriod===k?" on":""}" data-p="${k}">${l}</button>`).join("");
  const views=[["list","一覧"],["day","日別"],["sum","集計"]]
    .map(([k,l])=>`<button data-v="${k}" class="${chView===k?"on":""}">${l}</button>`).join("");

  let body="";
  if(rows.length===0){
    body=`<div class="hint" style="margin:14px 6px">${r.label}の記録はありません。</div>`;
  }
  else if(chView==="sum"){
    body=`<div class="ch-meta">${r.label} ・ 稼働 ${daySet.size}日 ・ ${rows.length}件${chTravel>0?` ・ うち移動 ${fmtDur(chTravel)}`:""}<button class="sum-copy" id="chCopy">コピー</button></div>`;
    const trs=[...byTask.entries()].sort((a,b)=>b[1]-a[1]);
    const tmax=Math.max(1,...trs.map(x=>x[1]));
    body+=`<div class="sum-sub" style="margin:6px 6px 4px">業務別</div>`;
    for(const [t,min] of trs){
      body+=`<div class="sum-row"><span class="sum-dot" style="background:${c.color}"></span>
        <span class="sum-name">${esc(t)}</span>
        <span class="sum-bar-wrap"><span class="sum-bar" style="width:${(min/tmax*100).toFixed(1)}%;background:${c.color}"></span></span>
        <span class="sum-time mono">${fmtDurShort(min)}</span></div>`;
    }
  }
  else if(chView==="day"){
    const byDay=new Map();
    for(const e of rows){ const k=dateKey(new Date(e.start)); if(!byDay.has(k))byDay.set(k,[]); byDay.get(k).push(e); }
    for(const [k,list] of byDay){
      let dTotal=0; list.forEach(e=>dTotal+=((e.end||now)-e.start)/60000);
      const d=dayFromKey(k);
      body+=`<div class="ch-day-h"><span class="d">${d.getMonth()+1}/${d.getDate()}（${DOW[d.getDay()]}）</span><span class="t">${fmtDur(dTotal)}</span></div>`;
      for(const e of list) body+=chRowHTML(e,now,false);
    }
  }
  else{ // list
    for(const e of rows) body+=chRowHTML(e,now,true);
  }

  sheetBody.innerHTML=`
    <div class="ch-head">
      <span class="ch-dot" style="background:${c.color}"></span>
      <span class="ch-name">${esc((c.code?c.code+" ":"")+c.name)}</span>
      <span class="ch-total">${fmtDur(total)}</span>
    </div>
    <div class="ch-chips">${chips}</div>
    <div class="ch-views">${views}</div>
    <div id="chBody">${body}</div>`;

  document.getElementById("chBack").onclick=closeSheet;
  sheetBody.querySelectorAll(".ch-chip").forEach(b=>b.onclick=()=>{ chPeriod=b.dataset.p; drawClientHistory(c); });
  sheetBody.querySelectorAll(".ch-views button").forEach(b=>b.onclick=()=>{ chView=b.dataset.v; drawClientHistory(c); });
  sheetBody.querySelectorAll(".ch-row[data-id]").forEach(el=>el.onclick=()=>openEditEntry(el.dataset.id));
  const cp=document.getElementById("chCopy");
  if(cp) cp.onclick=()=>{
    const trs=[...byTask.entries()].sort((a,b)=>b[1]-a[1]);
    const L=[`${(c.code?c.code+" ":"")+c.name} 工数（${r.label}）`];
    trs.forEach(([t,m])=>L.push(`${t} … ${fmtDur(m)}`));
    L.push(`合計 … ${fmtDur(total)}（稼働${daySet.size}日・${rows.length}件${chTravel>0?`・うち移動 ${fmtDur(chTravel)}`:""}）`);
    copyText(L.join("\n"),null);
  };
}
function chRowHTML(e,now,withDate){
  const end=e.end||now; const dur=(end-e.start)/60000;
  const d=new Date(e.start);
  const dt=withDate?`<span class="dt">${d.getMonth()+1}/${d.getDate()}</span>`:`<span class="dt" style="width:0"></span>`;
  let html=`<div class="ch-row" data-id="${e.id}">
      ${dt}<span class="tm">${fmtTime(e.start)}–${e.end?fmtTime(end):"…"}</span>
      <span class="tk">${esc(e.task||"(業務未設定)")}</span>
      <span class="du">${fmtDurShort(dur)}</span>
    </div>`;
  const memo=(e.memo||"").trim();
  if(memo) html+=`<div class="ch-memo">${esc(memo)}</div>`;
  return html;
}

      r.querySelector(".edit").onclick=()=>editClient(c.id); rows.appendChild(r);

    if(clients.length===0){ const h=document.createElement("div"); h.className="hint"; h.textContent="顧問先がまだありません。"; rows.appendChild(h); }
