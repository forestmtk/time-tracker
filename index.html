  else if(t==="bulk"){
    pane.innerHTML=`<div class="hint">1行につき「コード␣社名」。既存コードは社名を上書き、新規は色を自動割り当てします。</div>
      <textarea class="bulk" id="bulkTxt" placeholder="407 Cyres&#10;412 三豊商事&#10;418 アライドカーボン"></textarea>
      <div class="actions"><button class="btn-fill" id="bulkGo">まとめて登録</button></div>`;
    document.getElementById("bulkGo").onclick=()=>{
      const lines=document.getElementById("bulkTxt").value.split("\n").map(s=>s.trim()).filter(Boolean);
      let added=0,updated=0;
      for(const ln of lines){
        const m=ln.match(/^(\S+)\s+(.+)$/); if(!m)continue;
        const code=m[1], name=m[2].trim();
        const ex=state.clients.find(c=>c.kind==="client"&&c.code===code);
        if(ex){ ex.name=name; updated++; }
        else{ state.clients.push({id:uid(),kind:"client",code,name,color:nextColor()}); added++; }
      }
      save(); toast(`追加${added}件・更新${updated}件`); paneRender("clients");
      document.querySelector('#segTop button[data-t="clients"]').click();
    };
  }
  else if(t==="tasks"){
    pane.innerHTML=`<div class="seg" id="taskSeg" style="margin-top:2px">
        <button data-k="client" class="on">顧問先の業務</button><button data-k="internal">社内の業務</button></div>
      <div id="taskPane"></div>`;
    const tseg=document.getElementById("taskSeg");
    tseg.querySelectorAll("button").forEach(b=>b.onclick=()=>{ tseg.querySelectorAll("button").forEach(x=>x.classList.remove("on")); b.classList.add("on"); taskPaneRender(b.dataset.k); });
    taskPaneRender("client");
  }
  else{ // data
    const nCli=state.clients.filter(c=>c.kind==="client").length;
    const nEnt=state.entries.length;
    pane.innerHTML=`
      <div class="hint">この端末のデータをファイルに書き出し／読み込みします。PC⇄スマホでデータを移すときやバックアップに。<b>自動同期はされません。</b>読み込むと今のデータは置き換わります。</div>
      <div style="margin:10px 4px;font-size:13px;color:var(--ink-soft)">現在：顧問先 <b>${nCli}</b> 件 ／ 記録 <b>${nEnt}</b> 件</div>
      <button class="btn-fill" id="expBtn" style="width:100%;margin:4px 0 10px">バックアップを書き出す（JSON）</button>
      <label class="btn-ghost" style="display:block;width:100%;text-align:center;box-sizing:border-box">バックアップを読み込む
        <input type="file" id="impFile" accept="application/json,.json" style="display:none"></label>`;
    document.getElementById("expBtn").onclick=exportData;
    document.getElementById("impFile").onchange=(ev)=>{ const f=ev.target.files&&ev.target.files[0]; if(f) importData(f); };
  }
}
function exportData(){
  try{
    const blob=new Blob([JSON.stringify(state,null,2)],{type:"application/json"});
    const url=URL.createObjectURL(blob);
    const a=document.createElement("a");
    a.href=url; a.download="time_tracker_backup_"+dateKey(new Date())+".json";
    document.body.appendChild(a); a.click(); a.remove();
    setTimeout(()=>URL.revokeObjectURL(url),1000);
    toast("書き出しました");
  }catch(e){ toast("書き出しに失敗しました"); }
}
function importData(file){
  const r=new FileReader();
  r.onload=()=>{
    let s;
    try{ s=JSON.parse(r.result); }catch(e){ toast("JSONを読めませんでした"); return; }
    if(!s||!Array.isArray(s.clients)||!Array.isArray(s.entries)){ toast("形式が違うようです"); return; }
    const nCli=s.clients.filter(c=>c.kind==="client").length;
    if(!confirm(`このバックアップ(顧問先${nCli}件・記録${s.entries.length}件)で現在のデータを置き換えます。よろしいですか?`)) return;
    if(!s.tasks) s.tasks={client:[...DEFAULT_TASKS.client],internal:[...DEFAULT_TASKS.internal]};
    if(s.tasks.client && !s.tasks.client.some(t=>(t||"").trim()==="移動")) s.tasks.client.push("移動");
    if(!s.dayMemos) s.dayMemos={};
    if(!s.savedDays) s.savedDays={};
    if(!s.resaveDays) s.resaveDays={};
    state=s; save(); closeSheet(); renderAll(); toast("読み込みました");
  };
  r.readAsText(file);
}
function taskPaneRender(k){
  const pane=document.getElementById("taskPane");
  const list=state.tasks[k];
  pane.innerHTML=`<div id="taskItems"></div>
    <div class="add-inline"><input id="newTask" placeholder="業務を追加" autocomplete="off"><button id="newTaskGo">追加</button></div>`;
  const items=document.getElementById("taskItems");
  list.forEach((t,i)=>{
    const row=document.createElement("div"); row.className="tasklist-item";
    row.innerHTML=`<span class="nm">${esc(t)}</span><button class="x" aria-label="削除">×</button>`;
    row.querySelector(".x").onclick=()=>{ list.splice(i,1); save(); taskPaneRender(k); };
    items.appendChild(row);
  });
  const add=()=>{ const v=document.getElementById("newTask").value.trim(); if(!v)return; if(!list.includes(v))list.push(v); save(); taskPaneRender(k); };
  document.getElementById("newTaskGo").onclick=add;
  document.getElementById("newTask").addEventListener("keydown",e=>{ if(e.key==="Enter")add(); });
}
function nextColor(){
  const used=state.clients.filter(c=>c.kind==="client").length;
  return PALETTE[used%PALETTE.length];
}
function editClient(id){
  const isNew=!id;
  const c=isNew?{id:uid(),kind:"client",code:"",name:"",color:nextColor()}:getClient(id);
  sheetHead.innerHTML=`<button class="back" id="backSet">‹</button><h2>${isNew?"顧問先を追加":"顧問先を編集"}</h2>`;
  document.getElementById("backSet").onclick=()=>{ renderSettings(); };
  sheetBody.innerHTML=`
    <div class="row2">
      <div class="field" style="flex:0 0 34%"><label>コード</label><input id="cCode" class="mono" value="${esc(c.code)}" placeholder="407"></div>
      <div class="field"><label>社名</label><input id="cName" value="${esc(c.name)}" placeholder="株式会社◯◯"></div>
    </div>
    <div class="field"><label>色</label><div class="color-grid" id="cColors"></div></div>
    <div class="actions">
      <button class="btn-fill" id="cSave">保存</button>
      ${isNew?"":`<button class="btn-danger" id="cDel">削除</button>`}
    </div>`;
  let chosen=c.color;
  const cg=document.getElementById("cColors");
  PALETTE.forEach(col=>{ const cell=document.createElement("button"); cell.className="color-cell"+(col===chosen?" sel":""); cell.style.background=col;
    cell.onclick=()=>{ chosen=col; cg.querySelectorAll(".color-cell").forEach(x=>x.classList.remove("sel")); cell.classList.add("sel"); }; cg.appendChild(cell); });
  document.getElementById("cSave").onclick=()=>{
    c.code=document.getElementById("cCode").value.trim();
    c.name=document.getElementById("cName").value.trim()||"(無名)";
    c.color=chosen;
    if(isNew) state.clients.push(c);
    save(); renderSettings(); renderAll(); toast(isNew?"追加しました":"保存しました");
  };
  const del=document.getElementById("cDel");
  if(del) del.onclick=()=>{
    const used=state.entries.some(e=>e.clientId===c.id);
    if(used && !confirm("この顧問先の記録が残っています。顧問先を削除しても過去の記録は残りますが、表示名が失われます。削除しますか?")) return;
    state.clients=state.clients.filter(x=>x.id!==c.id); save(); renderSettings(); renderAll(); toast("削除しました");
  };
}

/* ============================================================
   共通
============================================================ */
let toastTimer=null;
function toast(msg){ const t=document.getElementById("toast"); t.textContent=msg; t.classList.add("show"); clearTimeout(toastTimer); toastTimer=setTimeout(()=>t.classList.remove("show"),1800); }

function scrollToRelevant(){
  // 今 or 最初の記録が見える位置へ
  const dayStart=startOfDay(selDate).getTime();
  const viewTop=dayStart+VIEW_START_H*3600000;
  let targetMin;
  const run=runningEntry();
  if(run && isSameDay(new Date(run.start),selDate)) targetMin=(Date.now()-viewTop)/60000;
  else{
    const de=state.entries.filter(e=>isSameDay(new Date(e.start),selDate)).sort((a,b)=>a.start-b.start);
    targetMin = de.length? (de[0].start-viewTop)/60000 : (9-VIEW_START_H)*60;
  }
  const y=Math.max(0,targetMin*PX_MIN-120);
  scroll.scrollTo({top:y,behavior:"smooth"});
}

function renderAll(){ renderHeader(); renderTimeline(); renderSide(); renderDock(); if(appView==="analysis") renderAnalysis(); }

/* 進行中の毎秒更新(メモ入力中もカーソルが飛ばないよう、右パネルは再描画せず必要箇所だけ更新) */
setInterval(()=>{
  const run=runningEntry();
  updateElapsed();
  if(appView==="analysis") return;               // ふりかえり表示中は毎秒再描画しない（トグル操作を守る）
  if(!isSameDay(new Date(),selDate)) return;
  renderTimeline();                              // タイムライン(入力欄なし)は再描画OK
  // 右パネルはソフト更新のみ
  const now=Date.now();
  const dayEntries=state.entries.filter(e=>isSameDay(new Date(e.start),selDate));
  let total=0; dayEntries.forEach(e=>total+=((e.end||now)-e.start)/60000);
  const st=document.getElementById("sideTotal"); if(st) st.textContent=fmtDur(total);
  if(run){ const rd=document.getElementById("runLogDur"); if(rd) rd.textContent=fmtDurShort((now-run.start)/60000); }
},1000);

/* 初期化 */
renderAll();
scrollToRelevant();
if(!checkStaleRunning()) autoSaveYesterday();   // 締め忘れが無ければ前日分を自動保存
</script>
